name: h3_pendulum_attack_defended
seed: 0
output_root: results/runs

env:
  id: Pendulum-v1
  max_episode_steps: 200

training:
  total_steps: 6000
  batch_size: 64
  replay_size: 20000
  start_steps: 500
  gamma: 0.99
  tau: 0.005
  lr: 0.0003
  eval_every: 1000
  eval_episodes: 3

detector:
  enabled: true
  window_length: 16
  trigger_threshold: 0.5
  features:
    reward_stats: true
    action_stats: true
    state_shift: true
    temporal_delta: true

experts:
  enabled: true
  mode: experts
  classes:
    - clean
    - reward_poisoning
    - observation_corruption
    - action_perturbation

controller:
  enabled: true
  mode: hard_block
  harm_threshold: 0.35
  sanitize_replay: true
  harm_weights:
    reward_shift: 0.6
    detector_risk: 0.3
    expert_confidence: 0.1

corruption:
  enabled: true
  type: reward_poisoning
  schedule: bursty
  severity: medium
  random_sparse_p: 0.0
  burst_length: 20
  burst_period: 200
  observation_noise_scale: 0.0
  reward_flip_p: 1.0
  action_noise_scale: 0.0

logging:
  save_transition_windows: true
  save_model_checkpoints: false
