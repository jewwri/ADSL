name: baseline_halfcheetah
seed: 0
output_root: results/runs

env:
  id: HalfCheetah-v4
  max_episode_steps: null

training:
  total_steps: 100000
  batch_size: 256
  replay_size: 500000
  start_steps: 5000
  gamma: 0.99
  tau: 0.005
  lr: 0.0003
  eval_every: 10000
  eval_episodes: 3

detector:
  enabled: true
  window_length: 32
  trigger_threshold: 0.5
  features:
    reward_stats: true
    action_stats: true
    state_shift: true
    temporal_delta: true

experts:
  enabled: true
  mode: experts
  classes:
    - clean
    - reward_poisoning
    - observation_corruption
    - action_perturbation

controller:
  enabled: true
  mode: soft_attenuation
  harm_threshold: 0.5
  harm_weights:
    reward_shift: 0.4
    detector_risk: 0.3
    expert_confidence: 0.3

corruption:
  enabled: true
  type: mixed
  schedule: bursty
  severity: medium
  random_sparse_p: 0.03
  burst_length: 50
  burst_period: 500
  observation_noise_scale: 0.1
  reward_flip_p: 0.08
  action_noise_scale: 0.1

logging:
  save_transition_windows: false
  save_model_checkpoints: true

