name: h3_pendulum_clean
seed: 0
output_root: results/runs

env:
  id: Pendulum-v1
  max_episode_steps: 200

training:
  total_steps: 6000
  batch_size: 64
  replay_size: 20000
  start_steps: 500
  gamma: 0.99
  tau: 0.005
  lr: 0.0003
  eval_every: 1000
  eval_episodes: 3

detector:
  enabled: true
  window_length: 16
  trigger_threshold: 0.5
  features:
    reward_stats: true
    action_stats: true
    state_shift: true
    temporal_delta: true

experts:
  enabled: true
  mode: experts
  classes:
    - clean
    - reward_poisoning
    - observation_corruption
    - action_perturbation

controller:
  enabled: false
  mode: none
  harm_threshold: 0.5
  sanitize_replay: false

corruption:
  enabled: false
  type: clean
  schedule: random_sparse
  severity: low

logging:
  save_transition_windows: true
  save_model_checkpoints: false
